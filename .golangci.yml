version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - errcheck
    - revive
    - gocritic
    - bodyclose
    - misspell
    - unconvert

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    revive:
      rules:
        - name: unused-parameter
          disabled: false

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
      colors: true