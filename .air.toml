root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server ./cmd/scheduler"
entrypoint = "./tmp/server"
full_bin = "./tmp/server"

include_ext = ["go", "env"]
exclude_dir = ["tmp", "vendor", ".git"]
exclude_regex = ["_test.go"]

delay = 200
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true