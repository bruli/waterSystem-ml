name: Setup Go and Task

description: Setup Go, cache modules and install Task

runs:
  using: composite
  steps:
    - name: Set up Go 1.26.5
      uses: actions/setup-go@v7
      with:
        go-version: '1.26.5'
        cache: false

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install Task
      shell: bash
      run: |
        go install github.com/go-task/task/v3/cmd/task@latest
        echo "$HOME/go/bin" >> "$GITHUB_PATH"