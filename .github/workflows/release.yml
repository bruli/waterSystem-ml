name: Check, release and build image

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  security-events: write

env:
  DEPLOYMENT_FILE: manifests/deployment.yaml

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go and Task
        uses: ./.github/actions/setup-go-task

      - name: Lint
        run: task lint

  security:
    name: Security checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go and Task
        uses: ./.github/actions/setup-go-task

      - name: Security
        run: task security

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go and Task
        uses: ./.github/actions/setup-go-task

      - name: Tests
        run: task test

  trivy-filesystem:
    name: Scan source and dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.69.3"
        run: |
          set -euo pipefail

          curl -fsSLo trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"

          tar -xzf trivy.tar.gz trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy

          trivy --version

      - name: Scan repository
        run: |
          set -euo pipefail

          trivy filesystem \
            --scanners vuln,misconfig,secret \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            .

      - name: Generate SARIF report
        if: always()
        run: |
          set -euo pipefail

          trivy filesystem \
            --scanners vuln,misconfig,secret \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            .

      - name: Upload results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-filesystem

  release:
    name: Semantic release
    needs:
      - lint
      - security
      - test
      - trivy-filesystem

    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build, scan and push image
    needs: release

    if: >-
      github.ref == 'refs/heads/main' &&
      needs.release.outputs.released == 'true'

    runs-on:
      - self-hosted
      - raspberry
      - docker-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.69.3"
        run: |
          set -euo pipefail

          curl -sfL \
            https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- \
                -b /usr/local/bin \
                "v${TRIVY_VERSION}"

          trivy --version

      - name: Build image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          load: true
          push: false
          tags: |
            ghcr.io/bruli-lab/watersystem-ml:v${{ needs.release.outputs.version }}
            ghcr.io/bruli-lab/watersystem-ml:latest

      - name: Scan final image
        run: |
          set -euo pipefail

          trivy image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "ghcr.io/bruli-lab/watersystem-ml:v${{ needs.release.outputs.version }}"

      - name: Push versioned image
        run: |
          set -euo pipefail

          docker push \
            "ghcr.io/bruli-lab/watersystem-ml:v${{ needs.release.outputs.version }}"

      - name: Push latest image
        run: |
          set -euo pipefail

          docker push \
            "ghcr.io/bruli-lab/watersystem-ml:latest"

      - name: Update deployment image tag
        env:
          VERSION: v${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail

          sed -i \
            "s|ghcr.io/bruli-lab/watersystem-ml:[^[:space:]]*|ghcr.io/bruli-lab/watersystem-ml:${VERSION}|g" \
            "${DEPLOYMENT_FILE}"

          if git diff --quiet -- "${DEPLOYMENT_FILE}"; then
            echo "Deployment already references ${VERSION}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${DEPLOYMENT_FILE}"
          git commit -m "chore: update image to ${VERSION} [skip ci]"
          git push