version: '3'

vars:
  APP: 'watersystem-ml'
  DOCKER_COMPOSE: 'COMPOSE_BAKE=true docker compose'
  DOCKERFILE: 'Dockerfile'

  PYTHON: 'python3'
  VENV: 'python/.venv'
  PIP: '{{.VENV}}/bin/pip'
  PY: '{{.VENV}}/bin/python'

  IMAGE_REG: 'ghcr.io/bruli'
  IMAGE_NAME: '{{.IMAGE_REG}}/{{.APP}}'
  VERSION: '0.11.1'
  CURRENT_IMAGE: '{{.IMAGE_NAME}}:{{.VERSION}}'

  GOLANGCI_LINT_VERSION: 'v2.11.4'

silent: false

tasks:
  default:
    desc: Mostra l'ajuda
    cmds:
      - task --list

  venv:
    desc: Crear entorn virtual de Python
    cmds:
      - '{{.PYTHON}} -m venv {{.VENV}}'
    status:
      - test -d {{.VENV}}

  install:
    desc: Instal·lar dependències Python
    deps:
      - venv
    cmds:
      - '{{.PIP}} install --upgrade pip'
      - '{{.PIP}} install -r python/requirements-dev.txt'

  train:
    desc: Executar train.py
    cmds:
      - '{{.PY}} python/train.py'

  predict:
    desc: Executar predict.py en mode JSON
    cmds:
      - '{{.PY}} python/predict.py --json'

  shell:
    desc: Obrir shell amb el venv activat
    cmds:
      - echo "Activant venv..."
      - bash --rcfile <(echo "source {{.VENV}}/bin/activate")

  clean:
    desc: Netejar entorn virtual
    cmds:
      - rm -rf {{.VENV}}

  docker-up:
    desc: Arrencar serveis amb Docker Compose
    cmds:
      - |
        set -euo pipefail
        echo "🚀 Starting services with Docker Compose..."
        {{.DOCKER_COMPOSE}} up -d --build

  docker-down:
    desc: Aturar i eliminar serveis de Docker Compose
    cmds:
      - |
        set -euo pipefail
        echo "🛑 Stopping and removing Docker Compose services..."
        {{.DOCKER_COMPOSE}} down

  docker-ps:
    desc: Mostrar serveis actius
    cmds:
      - |
        set -euo pipefail
        echo "📋 Active services:"
        {{.DOCKER_COMPOSE}} ps

  docker-exec:
    desc: Obrir shell dins del contenidor de l'app
    cmds:
      - |
        set -euo pipefail
        echo "🔎 Opening shell inside {{.APP}}..."
        {{.DOCKER_COMPOSE}} exec {{.APP}} sh

  docker-influxdb-seed:
    desc: Crear dades de prova a InfluxDB
    cmds:
      - |
        set -euo pipefail
        echo "🔎 Creating data in influxdb ..."
        {{.DOCKER_COMPOSE}} exec {{.APP}} sh /app/scripts/seed_influxdb.sh

  docker-train:
    desc: Executar train.py dins Docker
    cmds:
      - |
        set -euo pipefail
        echo "🚀 Running train ..."
        {{.DOCKER_COMPOSE}} exec {{.APP}} /opt/venv/bin/python /app/python/train.py

  docker-predict:
    desc: Executar predict.py dins Docker
    cmds:
      - |
        set -euo pipefail
        echo "🚀 Running predict ..."
        {{.DOCKER_COMPOSE}} exec {{.APP}} /opt/venv/bin/python /app/python/predict.py

  docker-logs:
    desc: Mostrar logs del contenidor
    cmds:
      - |
        set -euo pipefail
        echo "👀 Showing logs for container {{.APP}} (CTRL+C to exit)..."
        docker logs -f {{.APP}}

  docker-login:
    desc: Login al registry GHCR
    cmds:
      - |
        echo "🔐 Logging into Docker registry..."
        echo "$CR_PAT" | docker login ghcr.io -u bruli --password-stdin

  docker-push-image:
    desc: Construir i pujar la imatge Docker arm64
    deps:
      - docker-login
    cmds:
      - |
        echo "🐳 Building and pushing Docker image {{.CURRENT_IMAGE}} ..."
        docker buildx build \
          --builder rpi-container-builder \
          --platform linux/arm64 \
          -t {{.CURRENT_IMAGE}} \
          -f {{.DOCKERFILE}} \
          --cache-to=type=registry,ref={{.IMAGE_NAME}}-buildcache,mode=max \
          --cache-from=type=registry,ref={{.IMAGE_NAME}}-buildcache \
          --push .
        echo "✅ Image {{.CURRENT_IMAGE}} pushed successfully."

  fmt:
    desc: Format Go amb gofumpt
    cmds:
      - |
        set -euo pipefail
        echo "👉 Formatting code with gofumpt..."
        go tool gofumpt -w .

  fix:
    desc: fixing code
    cmds:
      - |
        set -euo pipefail
        echo "👉 Running go fix..."
        go fix -v ./...

  security:
    desc: Revisar vulnerabilitats amb govulncheck
    cmds:
      - |
        set -euo pipefail
        echo "👉 Check security"
        go tool govulncheck ./...

  install-lint:
    desc: Instal·lar golangci-lint
    cmds:
      - |
        set -euo pipefail
        echo "🔧 Installing golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}

  lint:
    desc: Executar golangci-lint
    deps:
      - install-lint
    cmds:
      - |
        set -euo pipefail
        echo "🚀 Executing golangci-lint..."
        golangci-lint run ./...

  test:
    desc: Executar tests amb race, coverage i tparse
    cmds:
      - |
        set -euo pipefail
        echo "🧪 Running unit tests (race, JSON → tparse)..."
        go test -race ./... -json -cover -coverprofile=coverage.out | go tool tparse -all

  check:
    desc: Executar fmt, security, lint i test
    deps:
      - fmt
      - fix
      - security
      - lint
      - test